# MediaMop all-in-one (API + web UI). SQLite inside the container — see docker/README.md.
#
# From repo root:
#   cp docker/mediamop.env.example .env.mediamop
#   # edit MEDIAMOP_SESSION_SECRET — use a long random value (32+ chars)
#   docker compose --env-file .env.mediamop -f docker-compose.mediamop.yml up --build
#
# Pre-built image (no local build): use docker-compose.mediamop.ghcr.yml — see docker/README.md.
#
# Then open http://localhost:8788/ — first visit walks through admin setup when the DB is empty.

services:
  mediamop:
    build:
      context: .
      dockerfile: Dockerfile
    image: mediamop:local
    ports:
      - "8788:8788"
    environment:
      MEDIAMOP_SESSION_SECRET: ${MEDIAMOP_SESSION_SECRET:?see docker/mediamop.env.example}
      MEDIAMOP_HOME: ${MEDIAMOP_HOME:-/data/mediamop}
    volumes:
      - mediamop_data:/data/mediamop
    restart: unless-stopped

volumes:
  mediamop_data:
