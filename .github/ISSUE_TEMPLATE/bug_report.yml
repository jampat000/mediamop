name: Bug report
description: Report something in MediaMop that is broken or behaving incorrectly.
title: "[Bug]: "
labels:
  - type: bug
  - status: needs triage
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting this. Please include enough detail for the issue to be reproduced without access to your machine.
  - type: input
    id: version
    attributes:
      label: MediaMop version
      description: Use the release tag, commit SHA, or "main" if running from source.
      placeholder: v1.0.4
    validations:
      required: true
  - type: dropdown
    id: install_type
    attributes:
      label: Install type
      options:
        - Windows installer
        - Docker
        - Local development
        - Other
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Dashboard
        - Activity
        - Settings
        - Refiner
        - Pruner
        - Subber
        - Logs
        - Setup wizard
        - Backup and restore
        - Upgrade
        - Windows installer
        - Docker
        - CI or release
        - Other
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact clicks, settings, paths, and inputs used.
      placeholder: |
        1. Open ...
        2. Click ...
        3. Enter ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected result
      description: What should have happened?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual result
      description: What happened instead?
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      description: Remove secrets, tokens, private hostnames, and private media paths before posting.
      render: text
    validations:
      required: false

