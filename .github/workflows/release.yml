# Tag-driven release: push tag v* → same validation as ci.yml, then GitHub Release + mediamop-web-dist.zip.
# Top-level permissions stay read-only; only tagged-release escalates to contents:write for the release + upload.
# Keep step sequence aligned with .github/workflows/ci.yml (Test / mediamop).
name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  tagged-release:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install MediaMop backend (editable) + Playwright browser
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "./apps/backend[dev]"
          python -m playwright install --with-deps chromium

      - name: Run MediaMop backend tests
        working-directory: apps/backend
        env:
          MEDIAMOP_HOME: ${{ runner.temp }}/mediamop-ci
          MEDIAMOP_SESSION_SECRET: ci-mediamop-session-secret-32chars-min
        run: |
          alembic upgrade head
          pytest -q

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: MediaMop web — install, build, unit tests
        working-directory: apps/web
        run: |
          npm ci
          npm run build
          npm run test

      - name: Pack web dist (release artifact)
        run: (cd apps/web && zip -r "$GITHUB_WORKSPACE/mediamop-web-dist.zip" dist)

      - name: MediaMop E2E smoke (Playwright + real API)
        env:
          MEDIAMOP_E2E: "1"
          MEDIAMOP_HOME: ${{ runner.temp }}/mediamop-e2e
          MEDIAMOP_SESSION_SECRET: ci-mediamop-session-secret-32chars-min
          PYTHONPATH: ${{ github.workspace }}/apps/backend/src
        run: python -m pytest tests/e2e/mediamop -q --tb=short

      - name: Publish GitHub Release
        # Pin 2.x line: v3+ targets the Node 24 Actions runtime; keep v2 until runners are uniformly on that stack.
        uses: softprops/action-gh-release@v2.6.2
        with:
          files: mediamop-web-dist.zip
          generate_release_notes: true
          body: |
            **MediaMop** tested source release for `${{ github.ref_name }}`.

            **Install from source:** [docs/release.md](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/docs/release.md) · [docs/local-development.md](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/docs/local-development.md)

            **Attached:** `mediamop-web-dist.zip` — `vite` production bundle for `apps/web` only; the FastAPI backend is installed from this repository (`pip install -e ./apps/backend`), not from the zip.

            **Not published:** Docker images, Windows installers, PyPI/npm packages.
