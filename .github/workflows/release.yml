# Tag-driven release: push tag v* -> full validation, Windows installer, Docker image, GitHub Release.
name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  windows-smoke:
    runs-on: windows-latest
    if: ${{ !contains(github.ref_name, '-') }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install MediaMop backend (editable)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "./apps/backend[dev]"

      - name: MediaMop web - install and build
        working-directory: apps/web
        run: |
          npm ci
          npm run build

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build MediaMop Windows installer
        env:
          MEDIAMOP_BUILD_VERSION: ${{ github.ref_name }}
        run: powershell -ExecutionPolicy Bypass -File packaging/windows/build.ps1

      - name: Upload MediaMop Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: mediamop-windows-installer
          path: dist/windows/MediaMopSetup.exe

  tagged-release:
    runs-on: ubuntu-latest
    if: ${{ !contains(github.ref_name, '-') }}
    timeout-minutes: 90
    needs: windows-smoke
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install MediaMop backend (editable) and Playwright browser
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "./apps/backend[dev]"
          python -m playwright install --with-deps chromium

      - name: Run MediaMop backend tests
        working-directory: apps/backend
        env:
          MEDIAMOP_HOME: ${{ runner.temp }}/mediamop-ci
          MEDIAMOP_SESSION_SECRET: ci-mediamop-session-secret-32chars-min
        run: |
          alembic upgrade head
          pytest -q

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: MediaMop web - install, build, unit tests
        working-directory: apps/web
        run: |
          npm ci
          npm run build
          npm run test

      - name: Pack web dist
        run: |
          cd apps/web
          zip -r "$GITHUB_WORKSPACE/mediamop-web-dist.zip" dist

      - name: MediaMop E2E smoke (Playwright + real API)
        env:
          MEDIAMOP_E2E: "1"
          MEDIAMOP_HOME: ${{ runner.temp }}/mediamop-e2e
          MEDIAMOP_SESSION_SECRET: ci-mediamop-session-secret-32chars-min
          PYTHONPATH: ${{ github.workspace }}/apps/backend/src
        run: python -m pytest tests/e2e/mediamop -q --tb=short

      - name: Docker image name
        id: image
        run: echo "name=${REGISTRY}/$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Download MediaMop Windows installer
        uses: actions/download-artifact@v4
        with:
          name: mediamop-windows-installer
          path: ${{ github.workspace }}/windows-artifact

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish release Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          sbom: false
          tags: |
            ${{ steps.image.outputs.name }}:${{ github.ref_name }}
            ${{ steps.image.outputs.name }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ github.ref_name }}

      - name: Verify published Docker manifest
        run: docker manifest inspect "${{ steps.image.outputs.name }}:latest"

      - name: Smoke test published Docker image
        run: |
          docker rm -f mediamop-release-smoke >/dev/null 2>&1 || true
          docker run -d --name mediamop-release-smoke -p 8788:8788 \
            -e MEDIAMOP_SESSION_SECRET=ci-mediamop-session-secret-32chars-min \
            "${{ steps.image.outputs.name }}:latest"
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:8788/health >/tmp/mediamop-health.json; then
              cat /tmp/mediamop-health.json
              exit 0
            fi
            sleep 2
          done
          docker logs mediamop-release-smoke
          exit 1

      - name: Cleanup Docker smoke container
        if: always()
        run: docker rm -f mediamop-release-smoke >/dev/null 2>&1 || true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2.6.2
        with:
          files: |
            mediamop-web-dist.zip
            windows-artifact/MediaMopSetup.exe
          generate_release_notes: true
          body: |
            **MediaMop** release `${{ github.ref_name }}`.

            **Included artifacts**
            - `mediamop-web-dist.zip` - production web bundle from `apps/web/dist`
            - `MediaMopSetup.exe` - Windows desktop installer with tray host and bundled web UI

            **Container image**
            - `ghcr.io/${{ github.repository }}:${{ github.ref_name }}`
            - `ghcr.io/${{ github.repository }}:latest`

            **Registry publishing**
            - workflow publishes with the repository `GITHUB_TOKEN`

            **Run instructions**
            - Windows installer and release notes: `docs/release.md`
            - Docker: `docker/README.md`
