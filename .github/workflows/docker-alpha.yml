# Build and push an all-in-one image to GitHub Container Registry (GHCR).
# Triggers: manual (Actions → Docker alpha → Run workflow) or push of a tag matching v*-alpha*.
#
# Pull (after successful run, replace OWNER/REPO):
#   docker pull ghcr.io/OWNER/REPO:TAG
# Run:
#   docker run --rm -e MEDIAMOP_SESSION_SECRET='32+char secret' -p 8788:8788 -v mediamop-home:/data/mediamop \
#     ghcr.io/OWNER/REPO:TAG
#
# Tester docs: docker/README.md · overview: docs/docker.md
name: Docker alpha

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag (e.g. alpha or 0.1.0-alpha.1)"
        required: true
        default: alpha
        type: string
  push:
    tags:
      - "v*-alpha*"

concurrency:
  group: docker-alpha-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6

      - name: Image name (GHCR requires lowercase)
        id: image
        run: echo "name=${REGISTRY}/$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ github.event.inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:${{ steps.tag.outputs.value }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
