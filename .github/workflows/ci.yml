# MediaMop - backend tests, web build/tests, E2E smoke (Playwright + live API).
# Triggers: push to any branch, pull_request, workflow_dispatch.
# GitHub shows the job as "Test / mediamop".
# Keep this step sequence aligned with .github/workflows/release.yml.
name: Test

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  mediamop:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install MediaMop backend (editable) + Playwright browser
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "./apps/backend[dev]"
          python -m playwright install --with-deps chromium

      - name: Run MediaMop backend tests
        working-directory: apps/backend
        env:
          MEDIAMOP_HOME: ${{ runner.temp }}/mediamop-ci
          MEDIAMOP_SESSION_SECRET: ci-mediamop-session-secret-32chars-min
        run: |
          alembic upgrade head
          pytest -q

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: MediaMop web - install, build, unit tests
        working-directory: apps/web
        run: |
          npm ci
          npm run build
          npm run test

      - name: MediaMop E2E smoke (Playwright + real API)
        env:
          MEDIAMOP_E2E: "1"
          MEDIAMOP_HOME: ${{ runner.temp }}/mediamop-e2e
          MEDIAMOP_SESSION_SECRET: ci-mediamop-session-secret-32chars-min
          PYTHONPATH: ${{ github.workspace }}/apps/backend/src
        run: python -m pytest tests/e2e/mediamop -q --tb=short

  docker-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Build MediaMop Docker image
        run: docker build -t mediamop-ci-smoke .

      - name: Run MediaMop Docker smoke
        run: |
          docker rm -f mediamop-ci-smoke >/dev/null 2>&1 || true
          docker run -d --name mediamop-ci-smoke -p 8788:8788 mediamop-ci-smoke
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:8788/health >/tmp/mediamop-health.json; then
              cat /tmp/mediamop-health.json
              exit 0
            fi
            sleep 2
          done
          docker logs mediamop-ci-smoke
          exit 1

      - name: Cleanup MediaMop Docker smoke
        if: always()
        run: docker rm -f mediamop-ci-smoke >/dev/null 2>&1 || true

  windows-package-smoke:
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install MediaMop backend (editable) and Playwright browser
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "./apps/backend[dev]"
          python -m playwright install chromium

      - name: MediaMop web - install and build
        working-directory: apps/web
        run: |
          npm ci
          npm run build

      - name: MediaMop Windows auth shell smoke
        env:
          MEDIAMOP_E2E: "1"
          MEDIAMOP_HOME: ${{ runner.temp }}\mediamop-e2e
          MEDIAMOP_SESSION_SECRET: ci-mediamop-session-secret-32chars-min
          PYTHONPATH: ${{ github.workspace }}\apps\backend\src
        run: python -m pytest tests/e2e/mediamop/test_auth_shell_smoke.py -q --tb=short

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build MediaMop Windows installer
        env:
          MEDIAMOP_BUILD_VERSION: ci-${{ github.run_number }}
        run: powershell -ExecutionPolicy Bypass -File packaging/windows/build.ps1
