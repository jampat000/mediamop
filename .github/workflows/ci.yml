# MediaMop — backend tests, web build/tests, E2E smoke (Playwright + live API).
# Triggers: push to any branch, pull_request, workflow_dispatch. GitHub shows the job as "Test / mediamop".
# Keep step sequence aligned with .github/workflows/release.yml (tag-driven release re-runs the same checks).
name: Test

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  mediamop:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install MediaMop backend (editable) + Playwright browser
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "./apps/backend[dev]"
          python -m playwright install --with-deps chromium

      - name: Run MediaMop backend tests
        working-directory: apps/backend
        env:
          MEDIAMOP_HOME: ${{ runner.temp }}/mediamop-ci
          MEDIAMOP_SESSION_SECRET: ci-mediamop-session-secret-32chars-min
        run: |
          alembic upgrade head
          pytest -q

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: MediaMop web — install, build, unit tests
        working-directory: apps/web
        run: |
          npm ci
          npm run build
          npm run test

      - name: MediaMop E2E smoke (Playwright + real API)
        env:
          MEDIAMOP_E2E: "1"
          MEDIAMOP_HOME: ${{ runner.temp }}/mediamop-e2e
          MEDIAMOP_SESSION_SECRET: ci-mediamop-session-secret-32chars-min
          PYTHONPATH: ${{ github.workspace }}/apps/backend/src
        run: python -m pytest tests/e2e/mediamop -q --tb=short
