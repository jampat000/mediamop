# Optional PostgreSQL container — NOT used by MediaMop backend (SQLite-first under MEDIAMOP_HOME).
# Kept for ad hoc experiments or external tools only. The MediaMop API uses file-backed SQLite under MEDIAMOP_HOME — do not point it at this container.
#
# This file is NOT named docker-compose.yml so it does not auto-merge with compose.yaml (all-in-one app).
#
# From repo root:
#   docker compose -f docker-compose.postgres.yml up -d
#
# Default map: host 5433 -> container 5432 (avoids clashing with a local Postgres on 5432, if any).
# Web/API dev ports: docs/ports.md and scripts/dev-ports.json
#
# See docs/local-development.md

services:
  mediamop-postgres:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: mediamop
      POSTGRES_PASSWORD: mediamop
      POSTGRES_DB: mediamop
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mediamop -d mediamop"]
      interval: 5s
      timeout: 5s
      retries: 5
